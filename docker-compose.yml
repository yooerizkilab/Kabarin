version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: wa_gateway_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: whatsapp_gateway
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: wa_gateway_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-rootpassword}@db:3306/whatsapp_gateway
      JWT_SECRET: ${JWT_SECRET:-changeme}
      PORT: 3001
      HOST: 0.0.0.0
      SESSION_DIR: /app/sessions
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    volumes:
      - sessions:/app/sessions
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: wa_gateway_worker
    restart: unless-stopped
    command: node dist/workers/blastWorker.js
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-rootpassword}@db:3306/whatsapp_gateway
      SESSION_DIR: /app/sessions
    volumes:
      - sessions:/app/sessions
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: wa_gateway_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
  sessions:
