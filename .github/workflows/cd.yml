name: CD - Deploy to Server

on:
  push:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executing remote ssh commands using password/key
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }} # Use this if using password
          key: ${{ secrets.SERVER_SSH_KEY }}       # Use this if using PEM key
          port: 22
          script: |
            cd /path/to/whatsapp-gateway
            git pull origin master
            docker-compose up -d --build
